<div style="display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start;">
  <!-- Upload zone -->
  <div style="flex: 1; min-width: 280px;">
    <div class="section-note">Upload Zone</div>
    <div class="upload-zone-demo" data-cid="upload-zone">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <div style="font-size: 13px; color: var(--dim);">Drag files here or click to browse</div>
      <button class="btn btn-outline btn-sm">Browse Files</button>
    </div>
  </div>
  <!-- Upload indicators -->
  <div style="display: flex; flex-direction: column; gap: 16px;">
    <div class="section-note">Upload Indicator — in progress</div>
    <div class="upload-indicator-demo" data-cid="upload-in-progress">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <span style="font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--foreground);">video-final-cut.mp4</span>
        <span style="font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--blue);">67%</span>
      </div>
      <div class="upload-progress-bar">
        <div class="upload-progress-fill" style="width: 67%; background: var(--blue);"></div>
      </div>
    </div>
    <div class="section-note">Upload Indicator — completed</div>
    <div class="upload-indicator-demo" data-cid="upload-complete">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <span style="font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--foreground);">thumbnail.png</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="hsl(142 50% 45%)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="upload-progress-bar">
        <div class="upload-progress-fill" style="width: 100%; background: var(--success);"></div>
      </div>
    </div>
  </div>
</div>
