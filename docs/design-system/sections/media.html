<div style="flex: 1; min-width: 280px;">
  <div class="section-note">Chart (bar)</div>
  <div data-cid="chart-bar" style="border-radius: 12px; border: 1px solid var(--border); background: var(--card); padding: 16px 20px; aspect-ratio: 16/9; display: flex; flex-direction: column; justify-content: flex-end;">
    <div style="display: flex; align-items: flex-end; gap: 8px; height: 100%; padding-bottom: 8px;">
      <div style="flex:1; background: var(--primary); border-radius: 4px 4px 0 0; height: 60%; opacity: 0.8;"></div>
      <div style="flex:1; background: var(--primary); border-radius: 4px 4px 0 0; height: 80%; opacity: 0.8;"></div>
      <div style="flex:1; background: var(--primary); border-radius: 4px 4px 0 0; height: 45%; opacity: 0.8;"></div>
      <div style="flex:1; background: var(--primary); border-radius: 4px 4px 0 0; height: 90%; opacity: 0.8;"></div>
      <div style="flex:1; background: var(--primary); border-radius: 4px 4px 0 0; height: 70%; opacity: 0.8;"></div>
      <div style="flex:1; background: var(--primary); border-radius: 4px 4px 0 0; height: 55%; opacity: 0.8;"></div>
      <div style="flex:1; background: var(--primary); border-radius: 4px 4px 0 0; height: 95%; opacity: 0.8;"></div>
    </div>
    <div style="display: flex; gap: 8px; font-size: 9px; color: var(--dim); font-family: 'JetBrains Mono', monospace;">
      <span style="flex:1; text-align:center;">Mon</span>
      <span style="flex:1; text-align:center;">Tue</span>
      <span style="flex:1; text-align:center;">Wed</span>
      <span style="flex:1; text-align:center;">Thu</span>
      <span style="flex:1; text-align:center;">Fri</span>
      <span style="flex:1; text-align:center;">Sat</span>
      <span style="flex:1; text-align:center;">Sun</span>
    </div>
  </div>
</div>
