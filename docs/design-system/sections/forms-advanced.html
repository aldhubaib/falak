<div style="display: flex; gap: 32px; flex-wrap: wrap; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px;">
  <!-- Radio group -->
  <div>
    <div class="input-label" style="margin-bottom: 10px;">Video Format</div>
    <div class="radio-group" data-cid="radio-group">
      <div class="radio-item active" onclick="this.parentElement.querySelectorAll('.radio-item').forEach(r=>r.classList.remove('active'));this.classList.add('active');">
        <div class="radio-circle"><div class="radio-dot"></div></div>
        Video (16:9)
      </div>
      <div class="radio-item" onclick="this.parentElement.querySelectorAll('.radio-item').forEach(r=>r.classList.remove('active'));this.classList.add('active');">
        <div class="radio-circle"><div class="radio-dot"></div></div>
        Short (9:16)
      </div>
    </div>
  </div>

  <!-- Slider -->
  <div>
    <div class="input-label" style="margin-bottom: 10px;">Duration (seconds)</div>
    <div class="slider-demo" data-cid="slider">
      <div class="slider-track">
        <div class="slider-fill" style="width: 65%; border-radius: 9999px;"></div>
      </div>
      <div class="slider-thumb" style="left: calc(65% - 10px);"></div>
    </div>
    <div style="display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: var(--dim); font-family: 'JetBrains Mono', monospace; max-width: 300px;">
      <span>0</span><span>60</span><span>120</span>
    </div>
  </div>

  <!-- Toggle group -->
  <div>
    <div class="input-label" style="margin-bottom: 10px;">Display Mode</div>
    <div class="toggle-row" data-cid="toggle-group">
      <button class="toggle-btn active" onclick="this.parentElement.querySelectorAll('.toggle-btn').forEach(t=>t.classList.remove('active'));this.classList.add('active');">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
      <button class="toggle-btn" onclick="this.parentElement.querySelectorAll('.toggle-btn').forEach(t=>t.classList.remove('active'));this.classList.add('active');">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</div>
