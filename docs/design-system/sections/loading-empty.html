<div class="state-demo">
  <div class="state-box" data-cid="spinner">
    <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    <div style="font-size: 13px; color: var(--muted-foreground)">Loading channel data…</div>
  </div>
  <div class="state-box" data-cid="empty-state">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="1.5" opacity="0.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <div style="font-size: 13px; color: var(--dim); font-family: 'JetBrains Mono', monospace">No media found</div>
  </div>
  <div class="state-box" data-cid="skeleton">
    <div style="width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: flex-start">
      <div class="skeleton" style="height: 14px; width: 60%"></div>
      <div class="skeleton" style="height: 14px; width: 100%"></div>
      <div class="skeleton" style="height: 14px; width: 80%"></div>
      <div class="skeleton" style="height: 14px; width: 45%"></div>
    </div>
  </div>
</div>
