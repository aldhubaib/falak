<div class="two-col" style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px;">
  <div class="input-demo">
    <div class="field" data-cid="input-text">
      <label class="input-label">Text Input</label>
      <input class="input" type="text" placeholder="Enter channel name..." />
    </div>
    <div class="field" data-cid="input-textarea">
      <label class="input-label">Textarea</label>
      <textarea class="textarea" placeholder="Write a description..."></textarea>
    </div>
    <div class="field" data-cid="input-inline-btn">
      <label class="input-label">With inline button</label>
      <div style="position: relative;">
        <input class="input" type="text" placeholder="API Key" style="width: 100%; padding-right: 44px;" />
        <button class="icon-btn" style="position: absolute; right: 2px; top: 50%; transform: translateY(-50%);">
          <span class="tooltip-text">Save</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div>
    <div class="field" data-cid="input-disabled" style="margin-bottom: 16px">
      <label class="input-label">Disabled Input</label>
      <input class="input" type="text" value="Read only value" disabled style="opacity: 0.5; cursor: not-allowed" />
    </div>
    <div class="field" data-cid="input-error">
      <label class="input-label">With error</label>
      <input class="input" type="text" value="bad-url" style="border-color: var(--destructive)" />
      <span style="font-size: 11px; color: var(--destructive); margin-top: 2px">Invalid YouTube URL</span>
    </div>
  </div>
</div>
