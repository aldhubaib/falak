<div style="display: flex; gap: 16px; flex-wrap: wrap">
  <div data-cid="border-radius-sharp" style="width: 120px; height: 80px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace">
    sharp (0px)
  </div>
  <div data-cid="border-radius-lg" style="width: 120px; height: 80px; border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace">
    rounded-lg
  </div>
  <div data-cid="border-radius-xl" style="width: 120px; height: 80px; border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace">
    rounded-xl
  </div>
  <div data-cid="border-radius-full" style="width: 120px; height: 80px; border: 1px solid var(--border); border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace">
    rounded-full
  </div>
</div>
