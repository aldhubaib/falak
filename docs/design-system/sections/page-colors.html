<div class="swatch-grid">
  <div class="swatch" data-cid="swatch-background">
    <div class="swatch-color" style="background: var(--background)"></div>
    <div class="swatch-info"><div class="swatch-name">Background</div><div class="swatch-var">--background</div></div>
  </div>
  <div class="swatch" data-cid="swatch-card">
    <div class="swatch-color" style="background: var(--card)"></div>
    <div class="swatch-info"><div class="swatch-name">Background Alternative</div><div class="swatch-var">--background_alt</div></div>
  </div>
  <div class="swatch" data-cid="swatch-hover">
    <div class="swatch-color" style="background: var(--hover)"></div>
    <div class="swatch-info"><div class="swatch-name">Hover</div><div class="swatch-var">--hover</div></div>
  </div>
  <div class="swatch" data-cid="swatch-border">
    <div class="swatch-color" style="background: var(--border)"></div>
    <div class="swatch-info"><div class="swatch-name">Border</div><div class="swatch-var">--border</div></div>
  </div>
</div>
