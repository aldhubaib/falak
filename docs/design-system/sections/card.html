<div class="two-col">
  <div class="card-demo" data-cid="card-overview">
    <div class="card-header">
      <div class="card-title">Channel Overview</div>
      <div class="card-desc">Manage channel settings and video pipeline</div>
    </div>
    <div class="card-content">
      <div style="display: flex; flex-direction: column; gap: 8px">
        <div style="display: flex; justify-content: space-between; font-size: 13px">
          <span style="color: var(--sensor)">Videos</span>
          <span>142</span>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 13px">
          <span style="color: var(--sensor)">Subscribers</span>
          <span>1.2M</span>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 13px">
          <span style="color: var(--sensor)">Status</span>
          <span class="badge badge-success" style="font-size: 11px">Active</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Dialog preview -->
  <div id="dialog" class="dialog-demo" data-cid="dialog-delete">
    <div class="dialog-title">Delete this channel?</div>
    <div class="dialog-desc">This will permanently remove the channel and all its data. This action cannot be undone.</div>
    <div class="dialog-actions">
      <button class="icon-btn">
        <span class="tooltip-text">Cancel</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="icon-btn icon-btn-destructive">
        <span class="tooltip-text">Delete</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
  </div>
</div>
