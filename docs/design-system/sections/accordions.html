<div class="accordion-demo" data-cid="accordion" style="max-width: 480px;">
  <div class="accordion-item open" onclick="this.classList.toggle('open')">
    <button class="accordion-trigger">
      Video Details
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="accordion-body">Metadata, tags, thumbnails, and description fields for the selected video.</div>
  </div>
  <div class="accordion-item" onclick="this.classList.toggle('open')">
    <button class="accordion-trigger">
      Transcript
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="accordion-body">Full transcript with timestamps generated by Whisper.</div>
  </div>
  <div class="accordion-item" onclick="this.classList.toggle('open')">
    <button class="accordion-trigger">
      Analytics
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="accordion-body">View count, watch time, and engagement metrics over time.</div>
  </div>
</div>
