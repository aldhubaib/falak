<div class="panel-demo">
  <div style="padding: 16px; font-size: 12px; color: var(--dim);">Page content underneath the panel</div>
  <div class="panel-float" data-cid="panel-float">
    <div class="panel-header">
      <span style="font-size: 13px; font-weight: 600;">Channel Info</span>
      <button class="icon-btn" style="width: 24px; height: 24px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-section-label">Overview</div>
    <div class="panel-info-row"><span class="panel-info-key">Videos</span><span class="panel-info-value">142</span></div>
    <div class="panel-info-row"><span class="panel-info-key">Subscribers</span><span class="panel-info-value">1.2M</span></div>
    <div class="panel-info-row"><span class="panel-info-key">Country</span><span class="panel-info-value">SA</span></div>
    <div class="panel-section-label">Actions</div>
    <div style="display: flex; gap: 8px; padding: 4px 16px 12px;">
      <button class="icon-btn" style="width: 28px; height: 28px;">
        <span class="tooltip-text">Sync</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      </button>
      <button class="icon-btn icon-btn-primary" style="width: 28px; height: 28px;">
        <span class="tooltip-text">Analyze</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="icon-btn icon-btn-destructive" style="width: 28px; height: 28px;">
        <span class="tooltip-text">Remove</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
  </div>
</div>
